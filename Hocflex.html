<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Học flex trong trang web</title>
    <style>
        .flex-container{
            /* kích hoạt flexbox*/
            display: flex;
            /* căn chính các mục theo chiều ngang, tạo khoảng chống đều xung quanh*/
            justify-content: space-around;
            /* căn chính các mục theo chiều dọc (căn giữa)*/
            align-items: center;
            background-color: #f0f0f0;
            height: 150px;
            padding: 10px;
        }
        .flex-item{
            background-color: blue;
            color: white;
            padding: 20px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="flex-container">
        <div class="flex-item">Mục 1</div>
        <div class="flex-item">Mục2</div>
        <div class="flex-item">Mục3</div>
        <div class="flex-item">Mục4</div>

    </div>
</body>
</html>
